name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [jun-timeline-updated]
  schedule:
    - cron: "17 */2 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Checkout canonical JUN archive
        uses: actions/checkout@v4
        with:
          repository: Mreaggle/JumpstyleUnitedNations
          ref: main
          path: jun-archive
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install
        run: npm ci
      - name: Synchronize canonical JUN timeline
        run: npm run sync:jun -- --source jun-archive/JumpstyleTimeline/Global/global-timeline.md
      - name: Verify repository/site event parity
        run: npm run check:jun-sync -- --source jun-archive/JumpstyleTimeline/Global/global-timeline.md
      - name: Check
        run: npm run check
      - name: Build
        run: npm run build
      - name: Test
        run: npm run test
      - name: Audit content
        run: npm run audit:content
      - name: Audit links
        run: npm run audit:links
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
